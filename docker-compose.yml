services:
  chigua-downloader:
    image: ghcr.io/yantianqi1/chigua.com-down:main
    # Uncomment the next line (and comment "image") to build locally instead:
    # build: .
    container_name: chigua-downloader
    network_mode: host
    # 端口默认 8000，修改方式：取消下面注释并改值
    # environment:
    #   - PORT=8000
    volumes:
      # Change the left side to your desired download directory on the host
      - ./downloads:/downloads
    restart: unless-stopped
